<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>

<body bgcolor="white">
    <center>
        <h1>Student Registration Form</h1>
    </center>
    <table align="center" cellpadding="10" border="5" style="background-color: rgba(43, 144, 226, 0.884); border-radius: 10px;">
        <!-- First name -->
        <tr>
            <td>Name</td>
            <td><input type="text" name="First_NAME" maxlength="30">(max 30 characters a-z and A-Z)</

        </tr>
        <!-- Course Applied form -->
        <tr>
            <td>Course Applied for</td>
            <td>
                <select Name="Course">
                    <option value="MCA">MCA</option>
                    <option value="BCA">BCA</option>
                    <option value="PGDA">PGDA</option>
                    <option value="OLEVEL">OLEVEL</option>
            </td>
        </tr>
        <!-- Gender -->
        <tr>
            <td>Gender</td>
            <td>
                Female<input type="radio" name="Gender" value="Female">
                Male<input type="radio" name="Gender" value="Male">
            </td>
        </tr>
        <!-- Address -->
        <tr>
            <td>Country</td>
            <td><input type="text" name="Country" value="Indian" readonly="readonly"></td>
        </tr>
        <!-- Hobbies -->
        <tr>
            <td>Subject <br>
                <br>
                <br>
                <br>
            </td>
            <td>
                Maths
                <input type="checkbox" name="Subject" value="maths">
                Chemistry
                <input type="checkbox" name="subject" value="chemistry">
                Physic
                <input type="checkbox" name="subject" value="physic">
                Biology
                <input type="checkbox" name="subject" value="biology">
            </td>
        </tr>

        <!-- Submit and Reset -->
        <tr>
            <td colspan="2" align="center">
                <input type="Submit" value="Submit">
                <input type="button" value="Check me!">
            <input type="Reset" value="Reset">
        </td>
        </tr>


    </table>


</body>

</html>
